packages:
  - .

nodeLinker: hoisted
blockExoticSubdeps: false

allowBuilds:
  electron: true
  esbuild: true
  electron-winstaller: true
  macos-alias: true
  sharp: true

onlyBuiltDependencies:
  - electron
  - esbuild
  - electron-winstaller
  - macos-alias
  - sharp

patchedDependencies:
  '@electron/packager@18.4.4': patches/@electron__packager@18.4.4.patch
